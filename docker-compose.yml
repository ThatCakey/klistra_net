version: "3"

services:
  web:
    build:
      context: .
      dockerfile: dockerfiles/php/Dockerfile
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./php/public:/var/www/html
    environment:
      REDIS_REQUIREPASS: ${REDIS_REQUIREPASS}
      REDIS_HOST: redis
      ENCRYPTION_SALT: ${ENCRYPTION_SALT}
    depends_on:
      - redis
    restart: always
    command: ["apache2-foreground"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.klistra.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.klistra.entrypoints=websecure"
      - "traefik.http.routers.klistra.tls.certresolver=le"
      - "traefik.http.routers.klistra.tls.domains[0].main=${DOMAIN}"
      - "traefik.http.routers.klistra.tls.domains[0].sans=www.${DOMAIN}"
      - "traefik.http.services.klistra.loadbalancer.server.port=80"
    networks:
      - web
    

  redis:
    image: redis:7.4
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_REQUIREPASS}
      REDIS_REQUIREPASS: ${REDIS_REQUIREPASS}
    command: redis-server --requirepass ${REDIS_REQUIREPASS} --save ${REDIS_SAVE}
    volumes:
      - ${REDIS_STORAGE_PATH}:/data
    restart: always
    networks:
      - web

  traefik:
    image: traefik:latest
    command:
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entryPoint=web"
      - "--certificatesresolvers.le.acme.email=${LE_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    restart: unless-stopped
    networks:
      - web

volumes:
  traefik_letsencrypt:

networks:
  web:
    driver: bridge